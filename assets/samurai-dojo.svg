<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes breathe { 0%,100% { opacity:.72; transform:scale(1); } 50% { opacity:1; transform:scale(1.04); } }
    @keyframes scan { 0% { transform:translateY(-160px); opacity:0; } 18% { opacity:.3; } 100% { transform:translateY(620px); opacity:0; } }
    @keyframes gridMove { 0% { transform:translateY(0); } 100% { transform:translateY(42px); } }
    @keyframes ember { 0% { transform:translateY(40px) translateX(0); opacity:0; } 20% { opacity:.9; } 100% { transform:translateY(-520px) translateX(55px); opacity:0; } }
    @keyframes pulseLine { 0%,100% { stroke-dashoffset:0; opacity:.3; } 50% { stroke-dashoffset:-120; opacity:.95; } }
    @keyframes panel { 0%,100% { opacity:.48; } 50% { opacity:.9; } }
    @keyframes blade { 0%,100% { opacity:.55; filter:drop-shadow(0 0 8px #f97316); } 50% { opacity:1; filter:drop-shadow(0 0 18px #f97316); } }
    @keyframes cursor { 0%,48% { opacity:1; } 49%,100% { opacity:0; } }
    @keyframes trace { to { stroke-dashoffset:-280; } }
    .sun { animation:breathe 5s ease-in-out infinite; transform-origin:910px 130px; }
    .scan { animation:scan 4.2s linear infinite; }
    .grid { animation:gridMove 3.8s linear infinite; }
    .ember1 { animation:ember 6s linear infinite; }
    .ember2 { animation:ember 7.2s linear infinite 1.1s; }
    .ember3 { animation:ember 5.4s linear infinite 2.2s; }
    .pulseLine { stroke-dasharray:80 46; animation:pulseLine 3.2s ease-in-out infinite; }
    .panel { animation:panel 2.8s ease-in-out infinite; }
    .blade { animation:blade 3.5s ease-in-out infinite; }
    .cursor { animation:cursor 1s steps(1) infinite; }
    .trace { stroke-dasharray:32 18; animation:trace 5s linear infinite; }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030303"/>
      <stop offset=".42" stop-color="#100506"/>
      <stop offset=".72" stop-color="#190707"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(910 130) rotate(90) scale(185)">
      <stop stop-color="#f97316" stop-opacity=".85"/>
      <stop offset=".42" stop-color="#dc2626" stop-opacity=".24"/>
      <stop offset="1" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="katana" x1="520" y1="356" x2="760" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff7ed"/>
      <stop offset=".42" stop-color="#f97316"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0b0b0f" stop-opacity=".95"/>
      <stop offset="1" stop-color="#210707" stop-opacity=".88"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>
  <rect width="1200" height="520" fill="url(#sunGlow)" opacity=".55"/>

  <g class="grid" opacity=".22">
    <path d="M0 78h1200M0 120h1200M0 162h1200M0 204h1200M0 246h1200M0 288h1200M0 330h1200M0 372h1200M0 414h1200M0 456h1200M0 498h1200" stroke="#f97316" stroke-opacity=".25"/>
    <path d="M68 0v520M150 0v520M232 0v520M314 0v520M396 0v520M478 0v520M560 0v520M642 0v520M724 0v520M806 0v520M888 0v520M970 0v520M1052 0v520M1134 0v520" stroke="#fff7ed" stroke-opacity=".05"/>
  </g>

  <g class="sun" filter="url(#softGlow)">
    <circle cx="910" cy="130" r="74" fill="#f97316" opacity=".86"/>
    <circle cx="874" cy="106" r="76" fill="#100506" opacity=".82"/>
  </g>

  <g opacity=".5">
    <path class="pulseLine" d="M154 372C268 286 344 322 442 238C536 156 636 178 742 126" stroke="#f97316" stroke-width="3" fill="none"/>
    <path class="trace" d="M777 236h86l42 42h129" stroke="#dc2626" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path class="trace" d="M724 300h116l48 48h170" stroke="#f97316" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>

  <g class="panel" filter="url(#softGlow)">
    <rect x="76" y="62" width="370" height="118" rx="14" fill="url(#panelGrad)" stroke="#7f1d1d"/>
    <text x="102" y="98" fill="#f97316" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="700">SECURITY OPERATIONS</text>
    <text x="102" y="129" fill="#fff7ed" font-family="JetBrains Mono, Consolas, monospace" font-size="15">SIEM / CTI / INCIDENT TRIAGE</text>
    <text x="102" y="155" fill="#a3a3a3" font-family="JetBrains Mono, Consolas, monospace" font-size="13">Evidence-driven analysis and reporting</text>
    <rect x="102" y="164" width="206" height="4" rx="2" fill="#dc2626"/>
  </g>

  <g class="panel" opacity=".9">
    <rect x="770" y="286" width="332" height="144" rx="14" fill="url(#panelGrad)" stroke="#7f1d1d"/>
    <text x="796" y="321" fill="#f97316" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="700">LIVE ANALYSIS</text>
    <text x="796" y="352" fill="#fff7ed" font-family="JetBrains Mono, Consolas, monospace" font-size="13">ioc.enrich()     OK</text>
    <text x="796" y="378" fill="#fff7ed" font-family="JetBrains Mono, Consolas, monospace" font-size="13">alert.triage()   REVIEW</text>
    <text x="796" y="404" fill="#fff7ed" font-family="JetBrains Mono, Consolas, monospace" font-size="13">report.export()  READY</text>
    <rect x="966" y="342" width="82" height="8" rx="4" fill="#f97316"/>
    <rect x="966" y="368" width="118" height="8" rx="4" fill="#dc2626"/>
    <rect x="966" y="394" width="96" height="8" rx="4" fill="#f97316"/>
  </g>

  <g opacity=".82">
    <path d="M118 386h310" stroke="#7f1d1d" stroke-width="18" stroke-linecap="round"/>
    <path d="M154 334h230" stroke="#991b1b" stroke-width="10" stroke-linecap="round"/>
    <path d="M162 272h250" stroke="#7f1d1d" stroke-width="16" stroke-linecap="round"/>
    <path d="M190 214h192" stroke="#dc2626" stroke-width="8" stroke-linecap="round"/>
    <path d="M154 272v144M376 272v144" stroke="#7f1d1d" stroke-width="18" stroke-linecap="round"/>
    <path d="M130 246h270" stroke="#dc2626" stroke-width="24"/>
  </g>

  <g filter="url(#softGlow)" transform="translate(0,0)">
    <ellipse cx="602" cy="438" rx="144" ry="24" fill="#020202" opacity=".9"/>
    <path d="M545 340c16-64 96-86 142-32c20 24 28 62 20 104H520c-2-24 6-52 25-72z" fill="#0b0b0f" stroke="#7f1d1d" stroke-width="3"/>
    <path d="M560 344c26 26 82 32 132-2c8 24 10 48 6 70H532c0-24 8-48 28-68z" fill="#170707"/>
    <path d="M534 416h178" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
    <path d="M552 322c42-66 114-66 150 0c-50-16-98-16-150 0z" fill="#dc2626"/>
    <path d="M557 326c36-30 94-34 142 2" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
    <path d="M588 362h78" stroke="#fff7ed" stroke-width="6" stroke-linecap="round"/>
    <path class="blade" d="M590 390L782 132" stroke="url(#katana)" stroke-width="10" stroke-linecap="round"/>
    <path d="M576 402l-42 38" stroke="#fff7ed" stroke-width="8" stroke-linecap="round"/>
    <path d="M554 344l-66 68M688 344l76 72" stroke="#7f1d1d" stroke-width="16" stroke-linecap="round"/>
  </g>

  <g opacity=".95" filter="url(#softGlow)">
    <path d="M930 198l58-34l58 34v68l-58 34l-58-34z" fill="#0b0b0f" stroke="#f97316" stroke-width="4"/>
    <circle cx="988" cy="232" r="16" fill="#dc2626"/>
    <path d="M880 232h38M1058 232h54" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
    <path d="M1018 170l44-26l44 26v52l-44 26l-44-26z" fill="#0b0b0f" stroke="#dc2626" stroke-width="3" opacity=".78"/>
    <circle cx="1062" cy="196" r="11" fill="#f97316"/>
    <path d="M982 308l38-22l38 22v44l-38 22l-38-22z" fill="#0b0b0f" stroke="#f97316" stroke-width="3" opacity=".72"/>
  </g>

  <g class="ember1" fill="#f97316">
    <circle cx="78" cy="520" r="3"/><circle cx="260" cy="520" r="2"/><circle cx="670" cy="520" r="3"/><circle cx="1040" cy="520" r="2"/>
  </g>
  <g class="ember2" fill="#dc2626">
    <circle cx="180" cy="560" r="2"/><circle cx="492" cy="560" r="3"/><circle cx="818" cy="560" r="2"/><circle cx="1120" cy="560" r="3"/>
  </g>
  <g class="ember3" fill="#fff7ed" opacity=".55">
    <circle cx="340" cy="540" r="2"/><circle cx="735" cy="540" r="2"/><circle cx="960" cy="540" r="2"/>
  </g>

  <g class="scan">
    <rect x="0" y="0" width="1200" height="120" fill="#f97316" opacity=".16"/>
  </g>

  <text x="600" y="482" text-anchor="middle" fill="#fff7ed" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="700">
    THREAT DETECTION • INTELLIGENCE ENRICHMENT • EVIDENCE-BASED REPORTING
  </text>
  <text class="cursor" x="1010" y="482" fill="#f97316" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="700">_</text>
</svg>
