<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse { 0%,100% { opacity:.55; transform:scale(1); } 50% { opacity:1; transform:scale(1.06); } }
    @keyframes scan { 0% { transform:translateY(-520px); } 100% { transform:translateY(520px); } }
    @keyframes drift { 0% { transform:translateX(-80px); } 100% { transform:translateX(80px); } }
    @keyframes rain { 0% { transform:translateY(-80px); opacity:0; } 15% { opacity:.9; } 100% { transform:translateY(620px); opacity:0; } }
    @keyframes slash { 0%,58%,100% { opacity:0; transform:translateX(-18px) rotate(-14deg) scale(.75); } 62% { opacity:1; transform:translateX(14px) rotate(-14deg) scale(1.08); } 70% { opacity:0; transform:translateX(90px) rotate(-14deg) scale(1.3); } }
    @keyframes sword { 0%,55%,100% { transform:rotate(-16deg); } 63% { transform:rotate(-54deg); } 72% { transform:rotate(-8deg); } }
    @keyframes idle { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
    @keyframes droneA { 0%,100% { transform:translate(0,0); } 50% { transform:translate(-24px,-14px); } }
    @keyframes droneB { 0%,100% { transform:translate(0,0); } 50% { transform:translate(28px,12px); } }
    @keyframes bar { 0%,100% { width:210px; } 50% { width:152px; } }
    @keyframes flicker { 0%,100% { opacity:.9; } 10% { opacity:.3; } 20% { opacity:1; } 42% { opacity:.45; } 55% { opacity:1; } }
    @keyframes gate { 0%,100% { opacity:.35; } 50% { opacity:.75; } }
    .moon { animation:pulse 4s ease-in-out infinite; transform-origin:930px 112px; }
    .scan { animation:scan 3.2s linear infinite; }
    .clouds { animation:drift 7s ease-in-out infinite alternate; }
    .rain1 { animation:rain 2.4s linear infinite; }
    .rain2 { animation:rain 2.9s linear infinite .4s; }
    .rain3 { animation:rain 2.1s linear infinite .8s; }
    .samurai { animation:idle 1.8s ease-in-out infinite; }
    .blade { animation:sword 2.6s ease-in-out infinite; transform-origin:604px 296px; }
    .slash { animation:slash 2.6s ease-in-out infinite; transform-origin:650px 248px; }
    .droneA { animation:droneA 2.8s ease-in-out infinite; }
    .droneB { animation:droneB 3.2s ease-in-out infinite; }
    .bar { animation:bar 2.6s ease-in-out infinite; }
    .flicker { animation:flicker 1.5s linear infinite; }
    .gateGlow { animation:gate 2s ease-in-out infinite; }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" x2="1200" y1="0" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020202"/>
      <stop offset=".35" stop-color="#120607"/>
      <stop offset=".72" stop-color="#260909"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 112) rotate(90) scale(150)">
      <stop stop-color="#F97316" stop-opacity=".7"/>
      <stop offset=".45" stop-color="#DC2626" stop-opacity=".2"/>
      <stop offset="1" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bladeGrad" x1="560" x2="720" y1="320" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset=".45" stop-color="#F97316"/>
      <stop offset="1" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>
  <rect class="moon" x="780" y="-38" width="300" height="300" rx="150" fill="url(#moonGlow)"/>
  <circle class="moon" cx="930" cy="112" r="64" fill="#F97316" opacity=".92"/>
  <circle cx="905" cy="92" r="64" fill="#170707" opacity=".72"/>

  <g class="clouds" opacity=".55">
    <path d="M80 118h250" stroke="#7F1D1D" stroke-width="18" stroke-linecap="round"/>
    <path d="M190 92h340" stroke="#991B1B" stroke-width="10" stroke-linecap="round"/>
    <path d="M705 172h360" stroke="#7F1D1D" stroke-width="12" stroke-linecap="round"/>
  </g>

  <g opacity=".78">
    <path d="M0 385h1200" stroke="#F97316" stroke-opacity=".36"/>
    <path d="M0 425h1200" stroke="#DC2626" stroke-opacity=".18"/>
    <path d="M0 464h1200" stroke="#F97316" stroke-opacity=".14"/>
  </g>

  <g class="gateGlow" filter="url(#glow)">
    <rect x="104" y="206" width="22" height="180" fill="#7F1D1D"/>
    <rect x="298" y="206" width="22" height="180" fill="#7F1D1D"/>
    <rect x="72" y="184" width="280" height="24" fill="#991B1B"/>
    <rect x="94" y="154" width="236" height="20" fill="#DC2626"/>
  </g>
  <path d="M128 386h168M126 416h172M124 446h176" stroke="#F97316" stroke-opacity=".24"/>

  <g opacity=".5">
    <path d="M0 0h1200M0 40h1200M0 80h1200M0 120h1200M0 160h1200M0 200h1200M0 240h1200M0 280h1200M0 320h1200M0 360h1200M0 400h1200M0 440h1200M0 480h1200" stroke="#FFFFFF" stroke-opacity=".035"/>
    <path d="M40 0v520M120 0v520M200 0v520M280 0v520M360 0v520M440 0v520M520 0v520M600 0v520M680 0v520M760 0v520M840 0v520M920 0v520M1000 0v520M1080 0v520M1160 0v520" stroke="#F97316" stroke-opacity=".04"/>
  </g>

  <g class="rain1" stroke="#F97316" stroke-opacity=".42" stroke-width="2">
    <path d="M80 0l-24 64M210 -50l-24 64M360 -10l-24 64M540 -70l-24 64M760 -30l-24 64M1010 -90l-24 64"/>
  </g>
  <g class="rain2" stroke="#DC2626" stroke-opacity=".34" stroke-width="2">
    <path d="M130 -120l-22 58M430 -80l-22 58M650 -140l-22 58M890 -60l-22 58M1130 -130l-22 58"/>
  </g>
  <g class="rain3" stroke="#FFF7ED" stroke-opacity=".2" stroke-width="1.5">
    <path d="M20 -160l-18 48M300 -100l-18 48M610 -170l-18 48M790 -120l-18 48M1080 -180l-18 48"/>
  </g>

  <g transform="translate(0 0)">
    <rect x="70" y="38" width="345" height="78" rx="10" fill="#050505" stroke="#7F1D1D"/>
    <text x="92" y="70" fill="#F97316" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="700">CYBER SAMURAI DOJO</text>
    <text class="flicker" x="92" y="98" fill="#FFF7ED" font-family="JetBrains Mono, Consolas, monospace" font-size="15">MISSION: HUNT SIGNALS / DEFEND THE TEMPLE</text>
  </g>

  <g transform="translate(790 360)">
    <rect width="250" height="16" rx="8" fill="#1F0A0A" stroke="#7F1D1D"/>
    <rect class="bar" width="210" height="16" rx="8" fill="#DC2626"/>
    <text x="0" y="-12" fill="#FFF7ED" font-family="JetBrains Mono, Consolas, monospace" font-size="14">ENEMY ALERT LEVEL</text>
  </g>

  <g class="droneA" filter="url(#glow)">
    <path d="M875 234l44-26 44 26v50l-44 26-44-26z" fill="#170707" stroke="#F97316" stroke-width="3"/>
    <circle cx="919" cy="259" r="14" fill="#DC2626"/>
    <path d="M858 258h-42M980 258h42" stroke="#F97316" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g class="droneB" filter="url(#glow)" opacity=".88">
    <path d="M1010 170l34-20 34 20v40l-34 20-34-20z" fill="#170707" stroke="#DC2626" stroke-width="3"/>
    <circle cx="1044" cy="190" r="10" fill="#F97316"/>
    <path d="M996 190h-34M1092 190h34" stroke="#DC2626" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g class="samurai" filter="url(#glow)">
    <ellipse cx="578" cy="448" rx="118" ry="22" fill="#050505" opacity=".8"/>
    <path d="M524 266c16-54 88-56 106 0l-20 74h-66z" fill="#1F0A0A" stroke="#F97316" stroke-width="4"/>
    <path d="M536 294h84l-20 28h-44z" fill="#DC2626"/>
    <circle cx="576" cy="220" r="38" fill="#170707" stroke="#F97316" stroke-width="4"/>
    <path d="M534 214c22-34 64-44 104-10-22 4-64 12-104 10z" fill="#DC2626"/>
    <path d="M548 224h58" stroke="#FFF7ED" stroke-width="5" stroke-linecap="round"/>
    <path d="M548 246h56" stroke="#F97316" stroke-width="4" stroke-linecap="round"/>
    <path d="M544 340l-36 88M608 340l36 88" stroke="#F97316" stroke-width="15" stroke-linecap="round"/>
    <path d="M538 318l-72 42M616 318l70 44" stroke="#DC2626" stroke-width="13" stroke-linecap="round"/>
    <g class="blade">
      <path d="M590 300L742 180" stroke="url(#bladeGrad)" stroke-width="9" stroke-linecap="round"/>
      <path d="M586 304l-30 24" stroke="#FFF7ED" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>

  <path class="slash" d="M648 168c96 28 176 86 238 172-106-36-196-92-270-170 10-4 20-5 32-2z" fill="#F97316" opacity=".8" filter="url(#glow)"/>
  <path class="slash" d="M668 202c70 22 132 66 178 122-78-24-145-66-202-124 7-2 15-2 24 2z" fill="#FFF7ED" opacity=".55"/>

  <g class="scan" opacity=".22">
    <rect x="0" y="0" width="1200" height="90" fill="#F97316"/>
  </g>

  <text x="600" y="492" text-anchor="middle" fill="#FFF7ED" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="700">
    PRESS START: SIEM TRIAGE - CTI FORGE - CTF ARENA
  </text>
</svg>
